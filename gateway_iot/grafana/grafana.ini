[server]
http_port = 3000

[security]
admin_user = admin
admin_password = agro_grafana_2026

[auth.anonymous]
enabled = false

[smtp]
enabled = true
host = smtp.gmail.com:587
# Completar con tus credenciales de Gmail:
# 1. Ve a https://myaccount.google.com/security
# 2. Activa "Verificación en 2 pasos"
# 3. Ve a "Contraseñas de aplicaciones" y genera una para "Correo"
# 4. Reemplaza los valores de abajo con tus datos reales
user = TU_CORREO@gmail.com
password = TU_APP_PASSWORD_DE_GMAIL
from_address = TU_CORREO@gmail.com
from_name = Sistema IoT Agricola
skip_verify = true

[log]
mode = console
level = info

[unified_alerting]
enabled = true

[alerting]
enabled = false

[feature_toggles]
# Habilita el proveedor de provisionamiento de alertas desde archivos YAML
alertingProvisioning = true
