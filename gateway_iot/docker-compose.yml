# ─────────────────────────────────────────────────────────────────────────────
# Gateway IoT Agrícola — Fases 4 + 5 + 7
# Stack completo: Mosquitto + Simulator + InfluxDB + Gateway + Grafana
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── 1. Broker MQTT ─────────────────────────────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: mqtt_broker_v2
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -t '$$SYS/#' -C 1 -i healthcheck -W 3"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── 2. Simulador de sensores IoT ───────────────────────────────────────────
  simulator:
    build:
      context: ../fase_2
      dockerfile: Dockerfile
    container_name: iot_simulator_v2
    depends_on:
      mosquitto:
        condition: service_healthy
    environment:
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - SUGARCANE_PATH=/app/datasets/sugarcane-prediction-dataset.csv
      - PALM_PATH=/app/datasets/crop-production-countries.csv
    volumes:
      - ../datasets:/app/datasets:ro
    restart: unless-stopped

  # ── 3. Base de datos de series temporales ──────────────────────────────────
  influxdb:
    image: influxdb:2.7
    container_name: influxdb_agro_v2
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_ORG=agricultura
      - DOCKER_INFLUXDB_INIT_BUCKET=agro_iot_data
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=agro_admin_2026
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=agro-iot-token-fase3-icesi-2026
      - DOCKER_INFLUXDB_INIT_RETENTION=0
    volumes:
      - influxdb_data:/var/lib/influxdb2
      - influxdb_config:/etc/influxdb2
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── 4. Gateway IoT — Pipeline Python ───────────────────────────────────────
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: iot_gateway_v2
    depends_on:
      mosquitto:
        condition: service_healthy
      influxdb:
        condition: service_healthy
    environment:
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - MQTT_TOPIC=agricultura/sensores/#
      - INFLUX_URL=http://influxdb:8086
      - INFLUX_TOKEN=agro-iot-token-fase3-icesi-2026
      - INFLUX_ORG=agricultura
      - INFLUX_BUCKET_RAW=agro_iot_data
      - INFLUX_BUCKET_PROCESSED=agro_iot_processed
      - INFLUX_BUCKET_ALERTS=agro_iot_alerts
    restart: unless-stopped

  # ── 5. Grafana — Dashboard de visualización ─────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: grafana_agro
    ports:
      - "3000:3000"
    depends_on:
      influxdb:
        condition: service_healthy
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=agro_grafana_2026
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
      - INFLUX_TOKEN=agro-iot-token-fase3-icesi-2026
      - INFLUX_ORG=agricultura
    volumes:
      - ./grafana/grafana.ini:/etc/grafana/grafana.ini
      - ./grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    restart: unless-stopped

volumes:
  mosquitto_data:
  mosquitto_log:
  influxdb_data:
  influxdb_config:
  grafana_data:
